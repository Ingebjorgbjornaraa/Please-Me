<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>You are the submitter</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* Header */
        .header {
            position: sticky;
            top: 0;
            z-index: 50;
            background: #000;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            border-bottom: 1px solid #222;
        }
        .header-logo { width: 32px; height: 32px; border-radius: 4px; }
        .header-title { font-size: 20px; font-weight: 600; letter-spacing: -0.5px; }

        /* Layout */
        .layout {
            display: flex;
            min-height: calc(100vh - 57px);
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: #0a0a0a;
            border-right: 1px solid #222;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            position: sticky;
            top: 57px;
            height: calc(100vh - 57px);
            overflow-y: auto;
        }

        .sidebar-section {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .sidebar-label {
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .sidebar-sublabel {
            font-size: 13px;
            color: #aaa;
            line-height: 1.4;
        }

        .text-input {
            background: #1a1a1a;
            border: 1px solid #333;
            color: #fff;
            padding: 10px 12px;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            width: 100%;
        }
        .text-input:focus { border-color: #555; }
        .text-input::placeholder { color: #555; }

        .textarea-input {
            background: #1a1a1a;
            border: 1px solid #333;
            color: #fff;
            padding: 10px 12px;
            border-radius: 6px;
            font-size: 13px;
            font-family: inherit;
            outline: none;
            width: 100%;
            resize: none;
            min-height: 80px;
        }
        .textarea-input:focus { border-color: #555; }
        .textarea-input::placeholder { color: #555; }

        .submit-btn {
            background: #fff;
            color: #000;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: opacity 0.15s;
        }
        .submit-btn:hover { opacity: 0.85; }
        .submit-btn:active { opacity: 0.7; }

        .divider {
            border: none;
            border-top: 1px solid #222;
            margin: 4px 0;
        }

        /* Leaderboard */
        .lb-title {
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .lb-grid {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .lb-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px;
            background: #151515;
            border-radius: 6px;
        }
        .lb-rank {
            font-size: 14px;
            font-weight: 700;
            min-width: 24px;
            color: #888;
        }
        .lb-thumb {
            width: 40px;
            height: 40px;
            object-fit: cover;
            border-radius: 4px;
            background: #222;
        }
        .lb-info { flex: 1; }
        .lb-user { font-size: 13px; font-weight: 500; }
        .lb-score-val { font-size: 11px; color: #666; }

        /* Feed */
        .feed-area {
            flex: 1;
            max-width: 600px;
            padding-bottom: 60px;
        }
        .post {
            border-bottom: 1px solid #222;
            padding-bottom: 8px;
            margin-bottom: 8px;
        }
        .post-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 16px;
        }
        .post-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 600;
            color: #aaa;
        }
        .post-username { font-size: 14px; font-weight: 600; }
        .post-image-container {
            width: 100%;
            background: #111;
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .post-image {
            width: 100%;
            max-height: 500px;
            object-fit: contain;
        }
        .post-meta {
            padding: 8px 16px;
            font-size: 12px;
            color: #666;
        }

        /* Mobile responsive */
        @media (max-width: 768px) {
            .layout { flex-direction: column; }
            .sidebar {
                position: relative;
                top: 0;
                width: 100%;
                height: auto;
                border-right: none;
                border-bottom: 1px solid #222;
            }
            .feed-area { max-width: 100%; }
        }

        /* Loading & empty */
        .loading-indicator {
            text-align: center;
            padding: 40px;
            color: #555;
            font-size: 14px;
        }
        .spinner {
            width: 24px;
            height: 24px;
            border: 2px solid #333;
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .file-input { display: none; }

        /* Error popup */
        .popup-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }
        .popup-overlay.visible { display: flex; }
        .popup-box {
            background: #1a1a1a;
            border: 1px solid #333;
            padding: 24px;
            border-radius: 12px;
            text-align: center;
            max-width: 300px;
        }
        .popup-box p { margin-bottom: 16px; font-size: 14px; }
        .popup-box button {
            background: #fff;
            color: #000;
            border: none;
            padding: 8px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
        }

        .success-msg {
            display: none;
            padding: 8px 12px;
            background: #1a3a1a;
            border: 1px solid #2a5a2a;
            border-radius: 6px;
            font-size: 13px;
            color: #6abf6a;
            text-align: center;
        }
        .success-msg.visible { display: block; }
    </style>
</head>
<body>
    <div class="header">
        <img src="images/logo.png" alt="" class="header-logo" />
        <span class="header-title">You are the submitter</span>
    </div>

    <div class="layout">
        <div class="sidebar">
            <div class="sidebar-section">
                <label class="sidebar-label">What's your submitter username?</label>
                <input type="text" id="usernameInput" class="text-input" placeholder="username" maxlength="20" />
            </div>

            <hr class="divider" />

            <div class="sidebar-section">
                <span class="sidebar-sublabel">Make your decision based on the</span>
                <span class="lb-title">LEADERBOARD:</span>
                <div class="lb-grid" id="lbGrid">
                    <div class="loading-indicator"><div class="spinner"></div></div>
                </div>
            </div>

            <hr class="divider" />

            <div class="sidebar-section">
                <button class="submit-btn" onclick="onSubmit()">SUBMIT</button>
                <input type="file" id="fileInput" class="file-input" accept="image/*" />
                <div class="success-msg" id="successMsg">Innlegget er publisert!</div>
            </div>

            <div class="sidebar-section">
                <label class="sidebar-label">Artist's statement</label>
                <textarea id="artistStatement" class="textarea-input" placeholder="Skriv din statement..."></textarea>
            </div>
        </div>

        <div class="feed-area" id="feed">
            <div class="loading-indicator" id="loadingIndicator">
                <div class="spinner"></div>
                Laster innlegg...
            </div>
        </div>
    </div>

    <div class="popup-overlay" id="popupOverlay">
        <div class="popup-box">
            <p id="popupMsg"></p>
            <button onclick="closePopup()">OK</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://sgpdcjpxnefmpvoyvcum.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNncGRjanB4bmVmbXB2b3l2Y3VtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3OTE5MDUsImV4cCI6MjA5MjM2NzkwNX0.LjDc9_yyVT4AWqdDgec9dxq77KoCJpkVxQpGr8XHLqo';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let posts = [];

        function showPopup(msg) {
            document.getElementById('popupMsg').textContent = msg;
            document.getElementById('popupOverlay').classList.add('visible');
        }
        function closePopup() {
            document.getElementById('popupOverlay').classList.remove('visible');
        }

        async function loadPosts() {
            const { data } = await sb
                .from('posts')
                .select('*, submitters(username)')
                .order('created_at', { ascending: false });

            const loader = document.getElementById('loadingIndicator');
            if (loader) loader.remove();

            posts = data || [];
            renderFeed();
        }

        function renderFeed() {
            const feed = document.getElementById('feed');
            feed.innerHTML = '';

            if (posts.length === 0) {
                feed.innerHTML = '<div class="loading-indicator">Ingen innlegg ennå — vær den første!</div>';
                return;
            }

            posts.forEach(post => {
                const username = post.submitters?.username || 'ukjent';
                const initial = username.charAt(0).toUpperCase();

                const postEl = document.createElement('div');
                postEl.className = 'post';
                postEl.innerHTML =
                    '<div class="post-header">' +
                        '<div class="post-avatar">' + initial + '</div>' +
                        '<span class="post-username">' + username + '</span>' +
                    '</div>' +
                    '<div class="post-image-container">' +
                        '<img src="' + post.image_url + '" class="post-image" loading="lazy" />' +
                    '</div>' +
                    '<div class="post-meta">"reaction"</div>';

                feed.appendChild(postEl);
            });
        }

        async function renderLeaderboard() {
            const { data: allScores } = await sb
                .from('scores')
                .select('post_id, total_score');

            const { data: allPosts } = await sb
                .from('posts')
                .select('*, submitters(username)');

            if (!allPosts) return;

            const scoreMap = {};
            if (allScores) {
                allScores.forEach(s => {
                    if (!scoreMap[s.post_id]) scoreMap[s.post_id] = 0;
                    scoreMap[s.post_id] += s.total_score;
                });
            }

            const sorted = [...allPosts].sort((a, b) =>
                (scoreMap[b.id] || 0) - (scoreMap[a.id] || 0)
            );

            const grid = document.getElementById('lbGrid');
            if (sorted.length === 0) {
                grid.innerHTML = '<div style="color:#555;font-size:13px;text-align:center;padding:12px;">Ingen data ennå</div>';
                return;
            }

            grid.innerHTML = sorted.slice(0, 8).map((p, i) =>
                '<div class="lb-item">' +
                    '<span class="lb-rank">#' + (i + 1) + '</span>' +
                    '<img class="lb-thumb" src="' + p.image_url + '" />' +
                    '<div class="lb-info">' +
                        '<div class="lb-user">' + (p.submitters?.username || '?') + '</div>' +
                        '<div class="lb-score-val">score: ' + Math.round(scoreMap[p.id] || 0) + '</div>' +
                    '</div>' +
                '</div>'
            ).join('');
        }

        async function onSubmit() {
            const username = document.getElementById('usernameInput').value.trim();
            if (!username) {
                showPopup('Skriv inn et brukernavn først');
                return;
            }
            if (username.length > 20) {
                showPopup('Brukernavn kan ikke være lengre enn 20 tegn');
                return;
            }
            document.getElementById('fileInput').click();
        }

        document.getElementById('fileInput').addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const username = document.getElementById('usernameInput').value.trim();
            const artistStatement = document.getElementById('artistStatement').value.trim();

            // Upload image
            const fileName = Date.now() + '_' + file.name.replace(/[^a-zA-Z0-9.]/g, '_');
            const { error: uploadError } = await sb.storage
                .from('posts')
                .upload(fileName, file);

            if (uploadError) {
                showPopup('Kunne ikke laste opp bildet: ' + uploadError.message);
                return;
            }

            const { data: urlData } = sb.storage.from('posts').getPublicUrl(fileName);
            const imageUrl = urlData.publicUrl;

            // Find or create submitter
            let { data: existing } = await sb
                .from('submitters')
                .select('*')
                .eq('username', username)
                .single();

            if (!existing) {
                const { data: created, error: subErr } = await sb
                    .from('submitters')
                    .insert({ username })
                    .select()
                    .single();
                if (subErr) {
                    showPopup('Kunne ikke opprette bruker: ' + subErr.message);
                    return;
                }
                existing = created;
            }

            // Create post
            const { error: postErr } = await sb
                .from('posts')
                .insert({
                    submitter_id: existing.id,
                    image_url: imageUrl,
                    artist_statement: artistStatement || null
                });

            if (postErr) {
                showPopup('Kunne ikke publisere: ' + postErr.message);
                return;
            }

            // Show success
            const msg = document.getElementById('successMsg');
            msg.classList.add('visible');
            setTimeout(() => msg.classList.remove('visible'), 3000);

            e.target.value = '';
            await loadPosts();
            await renderLeaderboard();
        });

        loadPosts();
        renderLeaderboard();

        // Refresh leaderboard every 30 seconds
        setInterval(renderLeaderboard, 30000);
    </script>
</body>
</html>
