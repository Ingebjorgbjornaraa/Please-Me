<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>You are the scroller</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            max-width: 500px;
            margin: 0 auto;
        }

        .header {
            position: sticky;
            top: 0;
            z-index: 50;
            background: #000;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            border-bottom: 1px solid #1a1a1a;
        }
        .header-logo { width: 78px; height: 78px; border-radius: 4px; }
        .header-title { font-size: 68px; font-weight: 600; letter-spacing: -0.3px; }

        .feed { padding-bottom: 60px; }

        .post {
            margin-bottom: 4px;
        }
        .post-username {
            padding: 10px 16px 6px;
            font-size: 13px;
            font-weight: 600;
            color: #e0e0e0;
        }
        .post-image-container {
            width: 100%;
            background: #111;
            min-height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .post-image {
            width: 100%;
            max-height: 600px;
            object-fit: contain;
        }

        .post-bottom {
            display: flex;
            align-items: center;
            padding: 8px 16px 12px;
            gap: 8px;
            border-bottom: 1px solid #1a1a1a;
        }
        .reaction-input {
            flex: 1;
            background: #1a1a1a;
            border: 1px solid #333;
            color: #fff;
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-family: inherit;
            outline: none;
        }
        .reaction-input:focus { border-color: #555; }
        .reaction-input::placeholder { color: #555; }
        .reaction-send {
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .reaction-send svg {
            width: 24px;
            height: 24px;
            fill: none;
            stroke: #888;
            stroke-width: 2;
        }
        .reaction-send:hover svg { stroke: #fff; }
        .reaction-sent {
            font-size: 12px;
            color: #4a9;
            display: none;
            padding: 4px 16px 8px;
        }
        .reaction-display {
            padding: 4px 16px 8px;
            font-size: 13px;
            color: #aaa;
            font-style: italic;
        }

        .loading-indicator {
            text-align: center;
            padding: 60px 40px;
            color: #555;
            font-size: 14px;
        }
        .spinner {
            width: 24px; height: 24px;
            border: 2px solid #333;
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="header">
        <img src="images/logo.png" alt="" class="header-logo" />
        <span class="header-title">You are the scroller</span>
    </div>

    <div class="feed" id="feed">
        <div class="loading-indicator" id="loadingIndicator">
            <div class="spinner"></div>
            Loading posts...
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://sgpdcjpxnefmpvoyvcum.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNncGRjanB4bmVmbXB2b3l2Y3VtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3OTE5MDUsImV4cCI6MjA5MjM2NzkwNX0.LjDc9_yyVT4AWqdDgec9dxq77KoCJpkVxQpGr8XHLqo';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        var posts = [];
        var currentVisiblePostId = null;
        var currentStartTime = null;
        var reactions = {};
        var existingReactions = {};

        async function loadPosts() {
            var result = await sb
                .from('posts')
                .select('*, submitters(username)')
                .order('created_at', { ascending: false });

            // Hent eksisterende reactions
            var scoresResult = await sb
                .from('scores')
                .select('post_id, reaction_text')
                .not('reaction_text', 'is', null);

            if (scoresResult.data) {
                scoresResult.data.forEach(function(s) {
                    if (!existingReactions[s.post_id]) existingReactions[s.post_id] = [];
                    existingReactions[s.post_id].push(s.reaction_text);
                });
            }

            document.getElementById('loadingIndicator').remove();

            if (result.error || !result.data || result.data.length === 0) {
                document.getElementById('feed').innerHTML =
                    '<div class="loading-indicator">No posts yet</div>';
                return;
            }
            posts = result.data;
            renderFeed();
            setupScrollTracking();
        }

        function renderFeed() {
            var feed = document.getElementById('feed');
            feed.innerHTML = '';

            posts.forEach(function(post) {
                var username = post.submitters ? post.submitters.username : 'unknown';
                var postEl = document.createElement('div');
                postEl.className = 'post';
                postEl.dataset.postId = post.id;

                // Bygg reaction-visning fra eksisterende reactions
                var reactionsHtml = '';
                if (existingReactions[post.id]) {
                    reactionsHtml = existingReactions[post.id].map(function(r) {
                        return '"' + r + '"';
                    }).join('  ');
                }

                postEl.innerHTML =
                    '<div class="post-username">' + username + '</div>' +
                    '<div class="post-image-container">' +
                        '<img src="' + post.image_url + '" class="post-image" loading="lazy" />' +
                    '</div>' +
                    '<div class="reaction-display" id="reactions-' + post.id + '">' + reactionsHtml + '</div>' +
                    '<div class="post-bottom">' +
                        '<input type="text" class="reaction-input" placeholder="react..." data-post-id="' + post.id + '" />' +
                        '<button class="reaction-send" data-post-id="' + post.id + '">' +
                            '<svg viewBox="0 0 24 24"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>' +
                        '</button>' +
                    '</div>' +
                    '<div class="reaction-sent" id="sent-' + post.id + '">sent</div>';

                feed.appendChild(postEl);

                var sendBtn = postEl.querySelector('.reaction-send');
                var input = postEl.querySelector('.reaction-input');

                sendBtn.addEventListener('click', function() {
                    var pid = this.dataset.postId;
                    var text = input.value.trim();
                    if (text) {
                        reactions[pid] = text;
                        input.value = '';
                        input.placeholder = text;

                        // Vis reaction under bildet umiddelbart
                        var reactEl = document.getElementById('reactions-' + pid);
                        if (reactEl.textContent) {
                            reactEl.textContent += '  "' + text + '"';
                        } else {
                            reactEl.textContent = '"' + text + '"';
                        }

                        // Vis "sent" bekreftelse
                        var sentEl = document.getElementById('sent-' + pid);
                        sentEl.style.display = 'block';
                        setTimeout(function() { sentEl.style.display = 'none'; }, 2000);

                        // Send score umiddelbart med reaction
                        sendReactionScore(pid, text);
                    }
                });

                input.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter') sendBtn.click();
                });
            });
        }

        async function sendReactionScore(postId, reactionText) {
            var timeSpent = currentStartTime ? (Date.now() - currentStartTime) / 1000 : 0;
            var timePoints = (timeSpent / 5) * 10;
            var reactionBonus = 150;
            var totalScore = timePoints + reactionBonus;

            console.log('Reaction score sent:', postId.substring(0,8), 'reaction:', reactionText, 'total:', Math.round(totalScore));

            await sb.from('scores').insert({
                post_id: postId,
                time_spent: Math.round(timeSpent * 10) / 10,
                liked: true,
                disliked: false,
                exit_post: false,
                total_score: Math.round(totalScore),
                reaction_text: reactionText
            });

            // Reset timer for this post so time-based scoring starts fresh
            if (postId === currentVisiblePostId) {
                currentStartTime = Date.now();
            }
        }

        function setupScrollTracking() {
            function getCurrentPost() {
                var viewportCenter = window.innerHeight / 2;
                var closest = null;
                var closestDist = Infinity;
                document.querySelectorAll('.post').forEach(function(el) {
                    var rect = el.getBoundingClientRect();
                    var center = rect.top + rect.height / 2;
                    var dist = Math.abs(center - viewportCenter);
                    if (dist < closestDist) {
                        closestDist = dist;
                        closest = el;
                    }
                });
                return closest;
            }

            var scrollTimeout;
            window.addEventListener('scroll', function() {
                clearTimeout(scrollTimeout);
                scrollTimeout = setTimeout(function() {
                    var visiblePost = getCurrentPost();
                    if (!visiblePost) return;
                    var newPostId = visiblePost.dataset.postId;
                    if (currentVisiblePostId && currentVisiblePostId !== newPostId) {
                        sendScore(currentVisiblePostId, false);
                    }
                    if (currentVisiblePostId !== newPostId) {
                        currentVisiblePostId = newPostId;
                        currentStartTime = Date.now();
                    }
                }, 200);
            });

            var firstPost = getCurrentPost();
            if (firstPost) {
                currentVisiblePostId = firstPost.dataset.postId;
                currentStartTime = Date.now();
            }

            setInterval(function() {
                if (currentVisiblePostId && currentStartTime) {
                    var timeSpent = (Date.now() - currentStartTime) / 1000;
                    if (timeSpent > 10) {
                        sendScore(currentVisiblePostId, false);
                        currentStartTime = Date.now();
                    }
                }
            }, 15000);
        }

        async function sendScore(postId, isExit) {
            if (!currentStartTime) return;
            var timeSpent = (Date.now() - currentStartTime) / 1000;
            var timePoints = (timeSpent / 5) * 10;
            var exitPenalty = isExit ? -300 : 0;
            var totalScore = timePoints + exitPenalty;

            console.log('Time score sent:', postId.substring(0,8), 'time:', Math.round(timeSpent), 'total:', Math.round(totalScore));

            await sb.from('scores').insert({
                post_id: postId,
                time_spent: Math.round(timeSpent * 10) / 10,
                liked: false,
                disliked: false,
                exit_post: isExit,
                total_score: Math.round(totalScore),
                reaction_text: null
            });
        }

        window.addEventListener('beforeunload', function() {
            if (currentVisiblePostId && currentStartTime) {
                var timeSpent = (Date.now() - currentStartTime) / 1000;
                var totalScore = (timeSpent / 5) * 10 - 300;
                fetch(SUPABASE_URL + '/rest/v1/scores', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'apikey': SUPABASE_KEY,
                        'Authorization': 'Bearer ' + SUPABASE_KEY
                    },
                    body: JSON.stringify({
                        post_id: currentVisiblePostId,
                        time_spent: Math.round(timeSpent),
                        liked: false, disliked: false, exit_post: true,
                        total_score: Math.round(totalScore),
                        reaction_text: null
                    }),
                    keepalive: true
                });
            }
        });

        loadPosts();
    </script>
</body>
</html>
