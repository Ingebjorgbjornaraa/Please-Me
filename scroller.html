<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>You are the scroller</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            max-width: 500px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            position: sticky;
            top: 0;
            z-index: 50;
            background: #000;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            border-bottom: 1px solid #222;
        }
        .header-logo { width: 32px; height: 32px; border-radius: 4px; }
        .header-title { font-size: 20px; font-weight: 600; letter-spacing: -0.5px; }

        /* Feed */
        .feed { padding-bottom: 60px; }

        .post {
            border-bottom: 1px solid #222;
            padding-bottom: 8px;
            margin-bottom: 8px;
        }
        .post-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 16px;
        }
        .post-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 600;
            color: #aaa;
        }
        .post-username { font-size: 14px; font-weight: 600; }

        .post-image-container {
            width: 100%;
            background: #111;
            min-height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .post-image {
            width: 100%;
            max-height: 600px;
            object-fit: contain;
        }

        .post-actions {
            display: flex;
            gap: 16px;
            padding: 10px 16px;
        }
        .action-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
            transition: transform 0.15s;
        }
        .action-btn:active { transform: scale(0.85); }
        .action-btn svg { width: 26px; height: 26px; }
        .action-btn.active svg { fill: #ed4956; }
        .action-btn.active-dislike svg { fill: #4a90d9; }

        .post-score {
            padding: 0 16px 4px;
            font-size: 13px;
            color: #666;
            display: none;
        }

        /* Loading */
        .loading-indicator {
            text-align: center;
            padding: 40px;
            color: #555;
            font-size: 14px;
        }
        .spinner {
            width: 24px;
            height: 24px;
            border: 2px solid #333;
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 80px 40px;
            color: #555;
        }
        .empty-state p { font-size: 16px; margin-top: 12px; }
    </style>
</head>
<body>
    <div class="header">
        <img src="images/logo.png" alt="" class="header-logo" />
        <span class="header-title">You are the scroller</span>
    </div>

    <div class="feed" id="feed">
        <div class="loading-indicator" id="loadingIndicator">
            <div class="spinner"></div>
            Laster innlegg...
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://sgpdcjpxnefmpvoyvcum.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNncGRjanB4bmVmbXB2b3l2Y3VtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3OTE5MDUsImV4cCI6MjA5MjM2NzkwNX0.LjDc9_yyVT4AWqdDgec9dxq77KoCJpkVxQpGr8XHLqo';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let posts = [];
        const postTimers = {};
        const postReactions = {};

        async function loadPosts() {
            const { data, error } = await sb
                .from('posts')
                .select('*, submitters(username)')
                .order('created_at', { ascending: false });

            document.getElementById('loadingIndicator').remove();

            if (error || !data || data.length === 0) {
                document.getElementById('feed').innerHTML =
                    '<div class="empty-state"><p>Ingen innlegg ennå</p></div>';
                return;
            }

            posts = data;
            renderFeed();
            setupScrollTracking();
        }

        function renderFeed() {
            const feed = document.getElementById('feed');
            feed.innerHTML = '';

            posts.forEach((post, index) => {
                const username = post.submitters?.username || 'ukjent';
                const initial = username.charAt(0).toUpperCase();

                const postEl = document.createElement('div');
                postEl.className = 'post';
                postEl.dataset.postId = post.id;
                postEl.dataset.index = index;

                postEl.innerHTML =
                    '<div class="post-header">' +
                        '<div class="post-avatar">' + initial + '</div>' +
                        '<span class="post-username">' + username + '</span>' +
                    '</div>' +
                    '<div class="post-image-container">' +
                        '<img src="' + post.image_url + '" class="post-image" loading="lazy" />' +
                    '</div>' +
                    '<div class="post-actions">' +
                        '<button class="action-btn like-btn" data-post-id="' + post.id + '">' +
                            '<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">' +
                                '<path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>' +
                            '</svg>' +
                        '</button>' +
                        '<button class="action-btn dislike-btn" data-post-id="' + post.id + '">' +
                            '<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">' +
                                '<path d="M10 15v4a3 3 0 0 0 3 3l4-9V2H5.72a2 2 0 0 0-2 1.7l-1.38 9a2 2 0 0 0 2 2.3zm7-13h2.67A2.31 2.31 0 0 1 22 4v7a2.31 2.31 0 0 1-2.33 2H17" transform="rotate(180 12 12)"/>' +
                            '</svg>' +
                        '</button>' +
                    '</div>';

                feed.appendChild(postEl);

                // Set up reaction buttons
                const likeBtn = postEl.querySelector('.like-btn');
                const dislikeBtn = postEl.querySelector('.dislike-btn');

                likeBtn.addEventListener('click', function() {
                    const pid = this.dataset.postId;
                    postReactions[pid] = { liked: true, disliked: false };
                    this.classList.add('active');
                    dislikeBtn.classList.remove('active-dislike');
                });

                dislikeBtn.addEventListener('click', function() {
                    const pid = this.dataset.postId;
                    postReactions[pid] = { liked: false, disliked: true };
                    this.classList.add('active-dislike');
                    likeBtn.classList.remove('active');
                });
            });
        }

        function setupScrollTracking() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const postId = entry.target.dataset.postId;
                    if (entry.isIntersecting) {
                        // Post came into view — start timer
                        postTimers[postId] = Date.now();
                    } else if (postTimers[postId]) {
                        // Post left view — finalize score
                        submitScore(postId);
                    }
                });
            }, { threshold: 0.5 });

            document.querySelectorAll('.post').forEach(post => {
                observer.observe(post);
            });
        }

        async function submitScore(postId) {
            const startTime = postTimers[postId];
            if (!startTime) return;

            const timeSpent = (Date.now() - startTime) / 1000;
            const reaction = postReactions[postId] || { liked: false, disliked: false };

            const timePoints = (timeSpent / 5) * 10;
            const likeBonus = reaction.liked ? 100 : 0;
            const dislikePenalty = reaction.disliked ? -100 : 0;
            const totalScore = timePoints + likeBonus + dislikePenalty;

            await sb.from('scores').insert({
                post_id: postId,
                time_spent: Math.round(timeSpent * 10) / 10,
                liked: reaction.liked,
                disliked: reaction.disliked,
                exit_post: false,
                total_score: Math.round(totalScore)
            });

            delete postTimers[postId];
        }

        // Handle page close — submit exit penalty for visible post
        window.addEventListener('beforeunload', () => {
            Object.keys(postTimers).forEach(postId => {
                const timeSpent = (Date.now() - postTimers[postId]) / 1000;
                const totalScore = (timeSpent / 5) * 10 - 200;
                navigator.sendBeacon(
                    SUPABASE_URL + '/rest/v1/scores',
                    new Blob([JSON.stringify({
                        post_id: postId,
                        time_spent: Math.round(timeSpent),
                        liked: false, disliked: false, exit_post: true,
                        total_score: Math.round(totalScore)
                    })], { type: 'application/json' })
                );
            });
        });

        loadPosts();
    </script>
</body>
</html>
