<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>you are the submitter</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            color: white;
            font-family: sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 500px;
            margin: 0 auto;
            overflow-x: hidden;
        }

        .header {
            width: 100%;
            padding: 8px 16px;
        }
        .header img { width: 100%; height: auto; }

        .main-content {
            width: 100%;
            padding: 0 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .username-section {
            position: relative;
            width: 100%;
        }
        .username-bg {
            width: 100%;
            height: auto;
        }
        .username-input {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 45%;
            background: transparent;
            border: none;
            color: #c8c0d8;
            font-size: 16px;
            font-family: sans-serif;
            outline: none;
            text-align: left;
        }
        .username-input::placeholder { color: rgba(200,192,216,0.5); }

        .leaderboard-section {
            width: 100%;
            position: relative;
        }
        .lb-area-bg {
            width: 100%;
            height: auto;
            display: block;
        }
        .lb-banner-top {
            width: 60%;
            margin: 0 auto 4px;
            display: block;
        }
        .lb-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            padding: 12px;
            min-height: 120px;
        }
        .lb-grid-item {
            position: relative;
            background: rgba(0,0,0,0.3);
            border-radius: 6px;
            overflow: hidden;
            aspect-ratio: 1;
        }
        .lb-grid-thumb {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .lb-grid-rank {
            position: absolute;
            top: 4px;
            left: 4px;
            background: rgba(0,0,0,0.7);
            color: #c8a0ff;
            font-size: 11px;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 4px;
        }
        .lb-grid-score {
            position: absolute;
            bottom: 4px;
            right: 4px;
            background: rgba(0,0,0,0.7);
            color: #aaa;
            font-size: 10px;
            padding: 2px 5px;
            border-radius: 3px;
        }
        .lb-grid-user {
            position: absolute;
            bottom: 4px;
            left: 4px;
            background: rgba(0,0,0,0.7);
            color: #ccc;
            font-size: 9px;
            padding: 2px 5px;
            border-radius: 3px;
            max-width: 60%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .feed-section {
            width: 100%;
            position: relative;
        }
        .feed-frame {
            position: relative;
            width: 100%;
        }
        .feed-frame-bg {
            width: 100%;
            height: auto;
            display: block;
        }
        .feed-img {
            position: absolute;
            top: 8%;
            left: 4%;
            width: 92%;
            height: 84%;
            object-fit: contain;
        }
        .feed-no-posts {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #666;
            font-size: 14px;
        }

        .submit-section {
            display: flex;
            gap: 12px;
            align-items: stretch;
        }
        .submit-left {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .submit-btn {
            background: none;
            border: none;
            cursor: pointer;
            transition: transform 0.15s;
        }
        .submit-btn:active { transform: scale(0.95); }
        .submit-btn img {
            width: 100%;
            height: auto;
        }

        .artist-section {
            flex: 1;
            position: relative;
        }
        .artist-bg {
            width: 100%;
            height: 100%;
            object-fit: fill;
        }
        .artist-textarea {
            position: absolute;
            top: 25%;
            left: 8%;
            width: 84%;
            height: 65%;
            background: transparent;
            border: none;
            color: #8b2252;
            font-size: 13px;
            font-family: sans-serif;
            resize: none;
            outline: none;
        }
        .artist-textarea::placeholder { color: rgba(139,34,82,0.4); }

        .next-section {
            display: flex;
            justify-content: center;
            padding: 8px 0 24px;
        }
        .next-btn {
            background: none;
            border: none;
            cursor: pointer;
            transition: transform 0.15s;
        }
        .next-btn:active { transform: scale(0.95); }
        .next-btn img { height: 40px; width: auto; }

        .file-input { display: none; }

        .error-popup {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #1a1a1a;
            border: 2px solid #c8a0ff;
            padding: 24px;
            border-radius: 12px;
            text-align: center;
            z-index: 200;
            max-width: 300px;
        }
        .error-popup.visible { display: block; }
        .error-popup p { margin-bottom: 16px; font-size: 14px; }
        .error-popup button {
            background: #c8a0ff;
            color: black;
            border: none;
            padding: 8px 24px;
            border-radius: 6px;
            cursor: pointer;
        }
        .overlay-bg {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            z-index: 199;
        }
        .overlay-bg.visible { display: block; }
    </style>
</head>
<body>
    <div class="header">
        <img src="images/submitter-header.png" alt="you are the submitter" />
    </div>

    <div class="main-content">
        <div class="username-section">
            <img src="images/username-field.png" alt="" class="username-bg" />
            <input type="text" id="usernameInput" class="username-input" placeholder="skriv her..." maxlength="20" />
        </div>

        <img src="images/leaderboard-banner.png" alt="leaderboard" class="lb-banner-top" />
        <div class="leaderboard-section">
            <div style="position: relative;">
                <img src="images/leaderboard-area.png" alt="" class="lb-area-bg" />
                <div class="lb-grid" id="lbGrid">
                    <div style="color: #666; font-size: 13px; grid-column: 1/-1; text-align: center; padding: 20px;">Laster leaderboard...</div>
                </div>
            </div>
        </div>

        <div class="feed-section">
            <div class="feed-frame">
                <img src="images/frame.png" alt="" class="feed-frame-bg" style="max-height: 280px; width: 100%; object-fit: contain;" />
                <img id="feedImage" class="feed-img" style="display:none" />
                <div id="noPostsMsg" class="feed-no-posts">Ingen innlegg ennå</div>
            </div>
        </div>

        <div class="submit-section">
            <div class="submit-left">
                <button class="submit-btn" onclick="onSubmit()">
                    <img src="images/submit.png" alt="submit" />
                </button>
            </div>
            <div class="artist-section">
                <img src="images/artist-statement.png" alt="" class="artist-bg" />
                <textarea id="artistStatement" class="artist-textarea" placeholder="skriv din statement..."></textarea>
            </div>
        </div>

        <div class="next-section">
            <button class="next-btn" onclick="onNext()">
                <img src="images/next.png" alt="next" />
            </button>
        </div>
    </div>

    <input type="file" id="fileInput" class="file-input" accept="image/*" />
    <div class="overlay-bg" id="overlayBg" onclick="closeError()"></div>
    <div class="error-popup" id="errorPopup">
        <p id="errorMsg"></p>
        <button onclick="closeError()">OK</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://sgpdcjpxnefmpvoyvcum.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNncGRjanB4bmVmbXB2b3l2Y3VtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3OTE5MDUsImV4cCI6MjA5MjM2NzkwNX0.LjDc9_yyVT4AWqdDgec9dxq77KoCJpkVxQpGr8XHLqo';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let posts = [];
        let currentIndex = 0;

        function showError(msg) {
            document.getElementById('errorMsg').textContent = msg;
            document.getElementById('errorPopup').classList.add('visible');
            document.getElementById('overlayBg').classList.add('visible');
        }
        function closeError() {
            document.getElementById('errorPopup').classList.remove('visible');
            document.getElementById('overlayBg').classList.remove('visible');
        }

        async function loadPosts() {
            const { data } = await sb
                .from('posts')
                .select('*, submitters(username)')
                .order('created_at', { ascending: false });
            posts = data || [];
            if (posts.length > 0) showPost();
            else document.getElementById('noPostsMsg').textContent = 'Ingen innlegg ennå';
        }

        function showPost() {
            if (posts.length === 0) return;
            const post = posts[currentIndex];
            const img = document.getElementById('feedImage');
            img.src = post.image_url;
            img.style.display = 'block';
            document.getElementById('noPostsMsg').style.display = 'none';
        }

        function onNext() {
            if (posts.length === 0) return;
            currentIndex = (currentIndex + 1) % posts.length;
            showPost();
        }

        async function onSubmit() {
            const username = document.getElementById('usernameInput').value.trim();
            if (!username) {
                showError('Skriv inn et brukernavn først');
                return;
            }
            if (username.length > 20) {
                showError('Brukernavn kan ikke være lengre enn 20 tegn');
                return;
            }
            document.getElementById('fileInput').click();
        }

        document.getElementById('fileInput').addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const username = document.getElementById('usernameInput').value.trim();
            const artistStatement = document.getElementById('artistStatement').value.trim();

            const fileName = Date.now() + '_' + file.name;
            const { data: uploadData, error: uploadError } = await sb.storage
                .from('posts')
                .upload(fileName, file);

            if (uploadError) {
                showError('Kunne ikke laste opp bildet: ' + uploadError.message);
                return;
            }

            const { data: urlData } = sb.storage.from('posts').getPublicUrl(fileName);
            const imageUrl = urlData.publicUrl;

            let { data: existingSubmitter } = await sb
                .from('submitters')
                .select('*')
                .eq('username', username)
                .single();

            if (!existingSubmitter) {
                const { data: newSubmitter, error: subError } = await sb
                    .from('submitters')
                    .insert({ username })
                    .select()
                    .single();
                if (subError) {
                    showError('Kunne ikke opprette bruker: ' + subError.message);
                    return;
                }
                existingSubmitter = newSubmitter;
            }

            const { error: postError } = await sb
                .from('posts')
                .insert({
                    submitter_id: existingSubmitter.id,
                    image_url: imageUrl,
                    artist_statement: artistStatement || null
                });

            if (postError) {
                showError('Kunne ikke opprette innlegg: ' + postError.message);
                return;
            }

            await loadPosts();
            await renderLeaderboard();
            e.target.value = '';
        });

        async function renderLeaderboard() {
            const { data: allScores } = await sb
                .from('scores')
                .select('post_id, total_score');

            const { data: allPosts } = await sb
                .from('posts')
                .select('*, submitters(username)');

            if (!allPosts) return;

            const scoreMap = {};
            if (allScores) {
                allScores.forEach(s => {
                    if (!scoreMap[s.post_id]) scoreMap[s.post_id] = 0;
                    scoreMap[s.post_id] += s.total_score;
                });
            }

            const sorted = [...allPosts].sort((a, b) =>
                (scoreMap[b.id] || 0) - (scoreMap[a.id] || 0)
            );

            const grid = document.getElementById('lbGrid');
            if (sorted.length === 0) {
                grid.innerHTML = '<div style="color:#666;font-size:13px;grid-column:1/-1;text-align:center;padding:20px;">Ingen innlegg ennå</div>';
                return;
            }

            grid.innerHTML = sorted.slice(0, 6).map((p, i) =>
                '<div class="lb-grid-item">' +
                    '<img class="lb-grid-thumb" src="' + p.image_url + '" />' +
                    '<span class="lb-grid-rank">#' + (i + 1) + '</span>' +
                    '<span class="lb-grid-user">' + (p.submitters?.username || '?') + '</span>' +
                    '<span class="lb-grid-score">' + Math.round(scoreMap[p.id] || 0) + '</span>' +
                '</div>'
            ).join('');
        }

        loadPosts();
        renderLeaderboard();
    </script>
</body>
</html>
