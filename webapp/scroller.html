<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>you are the scroller</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            color: white;
            font-family: sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 500px;
            margin: 0 auto;
            overflow-x: hidden;
        }

        .header {
            width: 100%;
            padding: 8px 16px;
        }
        .header img {
            width: 100%;
            height: auto;
        }

        .feed-container {
            width: 100%;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 8px;
        }
        .frame-wrapper {
            position: relative;
            width: 100%;
            max-width: 460px;
        }
        .frame-bg {
            width: 100%;
            height: auto;
            display: block;
        }
        .feed-image {
            position: absolute;
            top: 8%;
            left: 4%;
            width: 92%;
            height: 84%;
            object-fit: contain;
        }
        .no-posts {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #666;
            font-size: 16px;
            text-align: center;
        }

        .controls {
            width: 100%;
            padding: 12px 24px 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
        }
        .reaction-row {
            display: flex;
            gap: 24px;
            justify-content: center;
        }
        .reaction-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
            transition: transform 0.15s;
        }
        .reaction-btn:active { transform: scale(0.9); }
        .reaction-btn.active { transform: scale(1.15); }
        .reaction-btn img {
            width: 56px;
            height: 56px;
        }

        .action-row {
            display: flex;
            gap: 16px;
            justify-content: center;
        }
        .action-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
            transition: transform 0.15s;
        }
        .action-btn:active { transform: scale(0.95); }
        .action-btn img {
            height: 40px;
            width: auto;
        }

        .leaderboard-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            z-index: 100;
            overflow-y: auto;
            padding: 20px;
        }
        .leaderboard-overlay.visible { display: flex; flex-direction: column; align-items: center; }
        .lb-header {
            width: 100%;
            max-width: 460px;
        }
        .lb-header img { width: 100%; height: auto; }
        .lb-close {
            color: white;
            font-size: 14px;
            cursor: pointer;
            margin: 12px 0;
            text-decoration: underline;
        }
        .lb-list {
            width: 100%;
            max-width: 460px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .lb-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
        }
        .lb-rank {
            font-size: 18px;
            font-weight: bold;
            min-width: 36px;
            color: #c8a0ff;
        }
        .lb-thumb {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 4px;
            background: #222;
        }
        .lb-info {
            flex: 1;
        }
        .lb-username { font-size: 14px; color: #ccc; }
        .lb-score { font-size: 12px; color: #888; }

        .loading { color: #666; text-align: center; padding: 40px; }
    </style>
</head>
<body>
    <div class="header">
        <img src="images/scroller-header.png" alt="you are the scroller" />
    </div>

    <div class="feed-container">
        <div class="frame-wrapper">
            <img src="images/frame.png" alt="" class="frame-bg" />
            <img id="feedImage" class="feed-image" style="display:none" />
            <div id="noPostsMsg" class="no-posts">Laster innlegg...</div>
        </div>
    </div>

    <div class="controls">
        <div class="reaction-row">
            <button class="reaction-btn" id="likeBtn" onclick="onLike()">
                <img src="images/like.png" alt="like" />
            </button>
            <button class="reaction-btn" id="dislikeBtn" onclick="onDislike()">
                <img src="images/dislike.png" alt="dislike" />
            </button>
        </div>
        <div class="action-row">
            <button class="action-btn" onclick="onNext()">
                <img src="images/next.png" alt="next" />
            </button>
            <button class="action-btn" onclick="toggleLeaderboard()">
                <img src="images/leaderboard-banner.png" alt="leaderboard" style="height: 40px;" />
            </button>
        </div>
    </div>

    <div class="leaderboard-overlay" id="leaderboardOverlay">
        <div class="lb-header">
            <img src="images/leaderboard-banner.png" alt="leaderboard" />
        </div>
        <div class="lb-close" onclick="toggleLeaderboard()">lukk</div>
        <div class="lb-list" id="lbList"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://sgpdcjpxnefmpvoyvcum.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNncGRjanB4bmVmbXB2b3l2Y3VtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3OTE5MDUsImV4cCI6MjA5MjM2NzkwNX0.LjDc9_yyVT4AWqdDgec9dxq77KoCJpkVxQpGr8XHLqo';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let posts = [];
        let currentIndex = 0;
        let startTime = Date.now();
        let currentReaction = { liked: false, disliked: false };

        async function loadPosts() {
            const { data, error } = await sb
                .from('posts')
                .select('*, submitters(username)')
                .order('created_at', { ascending: false });

            if (error) {
                document.getElementById('noPostsMsg').textContent = 'Ingen innlegg ennå';
                return;
            }
            posts = data || [];
            if (posts.length > 0) {
                showPost();
            } else {
                document.getElementById('noPostsMsg').textContent = 'Ingen innlegg ennå';
            }
        }

        function showPost() {
            if (posts.length === 0) return;
            const post = posts[currentIndex];
            const img = document.getElementById('feedImage');
            img.src = post.image_url;
            img.style.display = 'block';
            document.getElementById('noPostsMsg').style.display = 'none';
            startTime = Date.now();
            currentReaction = { liked: false, disliked: false };
            document.getElementById('likeBtn').classList.remove('active');
            document.getElementById('dislikeBtn').classList.remove('active');
        }

        function onLike() {
            currentReaction.liked = true;
            currentReaction.disliked = false;
            document.getElementById('likeBtn').classList.add('active');
            document.getElementById('dislikeBtn').classList.remove('active');
        }

        function onDislike() {
            currentReaction.disliked = true;
            currentReaction.liked = false;
            document.getElementById('dislikeBtn').classList.add('active');
            document.getElementById('likeBtn').classList.remove('active');
        }

        async function onNext() {
            if (posts.length === 0) return;
            const post = posts[currentIndex];
            const timeSpent = (Date.now() - startTime) / 1000;
            const timePoints = (timeSpent / 5) * 10;
            const likeBonus = currentReaction.liked ? 100 : 0;
            const dislikePenalty = currentReaction.disliked ? -100 : 0;
            const totalScore = timePoints + likeBonus + dislikePenalty;

            await sb.from('scores').insert({
                post_id: post.id,
                time_spent: Math.round(timeSpent * 10) / 10,
                liked: currentReaction.liked,
                disliked: currentReaction.disliked,
                exit_post: false,
                total_score: Math.round(totalScore)
            });

            currentIndex = (currentIndex + 1) % posts.length;
            showPost();
        }

        async function toggleLeaderboard() {
            const overlay = document.getElementById('leaderboardOverlay');
            overlay.classList.toggle('visible');
            if (overlay.classList.contains('visible')) {
                await renderLeaderboard();
            }
        }

        async function renderLeaderboard() {
            const { data: allScores } = await sb
                .from('scores')
                .select('post_id, total_score');

            const { data: allPosts } = await sb
                .from('posts')
                .select('*, submitters(username)');

            if (!allPosts || !allScores) return;

            const scoreMap = {};
            allScores.forEach(s => {
                if (!scoreMap[s.post_id]) scoreMap[s.post_id] = 0;
                scoreMap[s.post_id] += s.total_score;
            });

            const sorted = [...allPosts].sort((a, b) =>
                (scoreMap[b.id] || 0) - (scoreMap[a.id] || 0)
            );

            const lbList = document.getElementById('lbList');
            lbList.innerHTML = sorted.map((p, i) =>
                '<div class="lb-item">' +
                    '<span class="lb-rank">#' + (i + 1) + '</span>' +
                    '<img class="lb-thumb" src="' + p.image_url + '" />' +
                    '<div class="lb-info">' +
                        '<div class="lb-username">' + (p.submitters?.username || 'ukjent') + '</div>' +
                        '<div class="lb-score">score: ' + Math.round(scoreMap[p.id] || 0) + '</div>' +
                    '</div>' +
                '</div>'
            ).join('');
        }

        window.addEventListener('beforeunload', async () => {
            if (posts.length === 0) return;
            const post = posts[currentIndex];
            const timeSpent = (Date.now() - startTime) / 1000;
            const totalScore = (timeSpent / 5) * 10 - 200;
            navigator.sendBeacon(
                SUPABASE_URL + '/rest/v1/scores',
                JSON.stringify({
                    post_id: post.id,
                    time_spent: Math.round(timeSpent),
                    liked: false, disliked: false, exit_post: true,
                    total_score: Math.round(totalScore)
                })
            );
        });

        loadPosts();
    </script>
</body>
</html>
